front:
  text: 太上長文大洞靈竇幽玄上品妙經發揮
  hash: sha256:63c4985f4bf56396b2c7ba61744a384e9247412393bc5dd36152797a5ba8370f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0009_HFL_000-001a, image: hfl/0619/0619-028.png}
body:
  text: 長文大洞經及五章法其義隱奥恐後學者難以入作故三十日爲制度非人勿傳祕之比喻六月初一日吾聞玉在石中鑿璞而方見珠在蚌中剖殻而方明道在人身修功而方成也今日汝記之三十日一小功六十日一大功九十日一周天九年鍊成周天一氣足計三百六十周天也方生三萬六千神全也假饒其精不動不妨夫甲乙者肝屬木庚辛者肺屬金肝神者是陽魂肺神者是陰魄鍊甲庚者是本元宫氣鍊東西神之位也二神者是龍虎九年陽魂神足陰魄皆靈方可大丹結化也至使成眞故神仙因將鍊炁而得也頌曰頑石蚌蛤藏珠玉走電飛霞光射目凡人腹内隱靈丹遺之鍊之神自足鉛汞六月初二日夫鉛宗者是天眞陽一氣汞祖者是地眞陰一氣本因二氣相交感結成眞胎如要修陰者鍊爲神也如修陽者鍊爲仙也神仙之事皆因鍊陰陽二氣而成也人若不將二氣烹鍊上下至中和會鉛汞豈能成造化矣頌曰鉛汞何人識祖宗皆因二氣㑹其中但能運用周天足十地三乘始見功七十二候六月初三日夫七十二候者一年之用也何爲五日成一候一候爲五日者是五行足一曰金一曰水一曰火一曰木一曰土於四季之内唯土方在中每九十日内十八日中氣也故方得而成人若修行須要四正内見土五行中見用一氣欲成眞八門須見數此七十二候即五行用也頌曰七十二候五行元春夏秋冬四季全中宫正氣須成土靈物方當在九年三才六月初四日夫天者有九天一者中天是大羅天八方是八極東方木位西方金位南方火位北方水位西北方天門東南風門西南人門東北鬼門故上有九霄天地有九地一者中土夫地者位在八方故下應九泉也夫人者有九竅上應九曜日月星三光明其宇宙精氣神者三事靈其一身如天順四時地順六氣人順五行此者三才備也頌曰天地因何在宫九中央八位有神功循環善用陰陽炁益壽延年萬事同坎離交六月初五日原闕文六月初六原闕三才八用六月初七日夫天地者只在一十五四季中央各有八數共計五十者存五行都計用八爲始天地之數用三十坤宫位也天之二十五乾宫也二氣相應方計五十五若將冲和之氣上下相會必得神生號曰眞人也金之用須同天地之用八數不離五行之用八位人之用八數不離五行之用在乎四時人之修行只依此用頌曰八用三才與五行高天厚地最分明遺將一氣能修錬精若靈時神自靈岀生化神六月初八日夫岀生者日出明朗月出生光晃朗萬耀萬物出生滋榮人神出生變化修身即神出不修則神散皈九道三道即上六道即下三道者仙道神道佛道六道者在下者駝驢象馬之等人若堅心修鍊久後成眞如人修鍊即神全必得生天此者名號出生變化若人修鍊佛道方歸佛道也若人修鍊仙道方歸仙道也人若不修豈能歸生神之道人若不行三等不歸道即轉回也頌曰三生三道在人修身外何須更苦求盡是從凡來入聖仙佛皆是汝心頭河車運轉六月初九日夫車者北方之正炁生於金内旺在水宫見火而成遇土成變故能生木運轉五行方號河車河車水也天地始生先得水而後生火人之所先得精而後得血眞胎所生先得氣而後變爲神也故聖人之言機於河車也頌曰河車本是水中輪水裏般來火裏存若錬自家身内寳一壼仙酒一浮雲四正八用六月初十日夫四正者只是鍊本宫之氣也春時只分春也生後有花謝秋時殺後有花開也蓋因見土而成反覆也人之作用上則有一降在下者即昇於上在左者即至於中在右者亦見於土故四正之氣皆會於中豈不謂之交也四氣見土便生黄芽名號之爲五芽之氣可生五常之神此神若全萬神俱足萬神俱足一體成眞方始爲眞人也頌曰四正生神最有功五芽變化萬靈通誰知左右皆相㑹南北常隨西與東六邪六月十一日夫六邪者一鼎破鼎破者元神將不備二鼎列衣鼎裂者是身有疾病三鼎損鼎損者是精血不相交四鼎竭鼎竭者是津液不相灌五鼎漏鼎漏者是中炁不滿六鼎枯鼎枯者是火不均如何得鼎無六邪須要三正三正既立使六邪不干三正者一心正心正者即萬神不亂二氣正氣正者即千神有靈三法正法正者即命可安使鼎可補神氣可正六神可安一身可淸眞道可成頌曰六邪傷損鼎難全三正從修炁自元一日若能成大藥始信丹砂出聖言三尸九蟲六月十二日夫三尸九蟲者是人身中三魔三尸管三田九蟲管臟腑多令人患者爲教人起諸魔第一起心魔多好酒色財氣第二起業魔多好殺害損傷第三起身魔多好作狂亂令人不能定其身心此是三尸何爲九蟲管人五臟腑内八殺風寒暑濕饑飽勞苦生疾病如何令去得三魔且久鍊氣神全眞人身成尸蟲自去也頌曰三尸之鬼是三魔九蟲爲病奈如何但將精氣神修鍊殺盡邪魔上大羅三山八寳六月十三日夫三山者一名利山二憎愛山三信行山如人㑹得此三山便是出其危難也謂利名山下多煩惱憎愛山頭足是非既無信行難成道跳出三山上聖知夫八寳者只言有七寳身多不知是何物也雙眼是人天之日月此爲觀色寳兩耳爲人天之道路此爲入聲寳兩鼻爲人天門户中岳能主香臭號出息寳一口爲人天之關鎖能主吞啖號曰太和寳一舌爲人天之根蒂主言語號和味寳大腸爲人天之車又能般載五穀號曰傳送之寳小腸爲人天之水路能主變化號曰主命寳此七寳者皆可用修行不知第八寳此一法最大事是人天之事號曰立身之寳如藏此八寳者是人修眞上士也頌曰跳出三山出愛河七寳八寳潤靈柯只憑身内精和血大藥方術味不多三等人修鍊六月十四日夫修鍊人之事三等一者修眞二者修假不修眞三者修眞不識尚求假修此者蓋不識眞僞萬萬千千號迷途也古來分明留傳經教汝等修行只言守精養血鍊氣存神奈何愚徒不省却亂行邪道修假豈得成其眞也或燒水銀成丹言是大藥或將諸般雜草悞勝靈藥端坐守靜到老無成休糧絶食空爲餓鬼更有多少邪見不一盡言欲要修眞言精氣神也頌曰無限修眞不識眞却將邪說亂其神爐中自有長生藥休要驅勞受苦辛九轉六月十五日一轉功人難曉鉛汞鍊成身内寳午前子後用周天十地三乘生死了二轉功切須㑹龍虎相交金鼎内龍吟虎嘯欲生風用成方可明眞僞三轉功聖胎結玉液鍊成如霜雪方知用氣可生神腹裏玄珠明日月四轉功神力大水火抽添無窒礙身形漸覺炁輕清萬事無著心自在五轉功半仙分初地小乘休與論知君名已掛仙曹他日自有眞人問六轉功眞氣旺好用精神福無量靈童變化欲昇仙超覺金丹最爲上七轉功心自訝春夏秋冬行八卦年深漸漸萬神全此法尋思何有價八轉功丹藥就魂魄陰陽分左右大將四季坎離宫年衰却返千年壽九轉功是仙才仙人引接到蓬萊走鬼行尸爭信此道昌得化法門開頌曰九轉功成上九霄九天雲外霧霞高九重光裏神仙㑹入聖皆因坎離交三生六月十六日夫三生者是身生性性生命也上即氣能生身中即神能生性下即精能生命矣何故爲上元泥丸是精源下元丹田爲氣海中元明堂號神君下元生氣騰於上上元生精降下故上下相交在中方生其神也頌曰三生上下在冲和酒色返爲燭畔蛾莫怪此言方引誘光陽時景不能多五芽造化成眞六月十七日夫五芽者五行之氣也春旺其肝夏旺其心秋旺其肺冬旺其腎唯土旺四季若論内事即四方不見土何物作黃芽外喻金木水火土内像肝肺心腎外無土即五芽不生内無土五氣不結故聖人云三田不滿即五芽不生一氣不交即四時不順五芽生萬神足功滿之理也頌曰五芽氣旺萬神生一物生時道自成直候三田功自滿神仙相引到蓬瀛德行六月十八日夫修身養氣之人且要修德謂與道同德高而道高故道德相輔方可道生於德德生於行人若修道先修其德先修其行爲行長即壽長行短即壽短故修持行與道同成之理也自古以來聖人之言小人進德行災禍不臨於身君子進德行養命得長生故太上置法題立道德爲名也頌曰道德先須要行功暗施陰騭可能通修眞志士長生訣皆在三才八卦中雨潤苗稼六月十九日夫天生萬物無不應時而順天地方可生成也須春風夏雨秋霜冬雪有此便助氣候無失便得其序名號及時造化矣今說其人之眞上元即如天下元即如地中元即如人但將地氣騰天氣降中氣和三田潤百脉滋四時順萬神安天地雨降精血流行陽勝陰消此者長生之道也頌曰春夏秋冬不失時風雨霜雪潤苗基但將陽氣磨陰氣必有長生上聖梯乾坤數六月二十日夫乾之數二百十六坤之數一百四十四其成三百六十日也汝知否弟子不知吾今日爲汝細解爲汝細筭便見八用之理夫乾者天也坤者地也天用八方每一方有三陽每一陽有九數計二十七數八方是八箇二十七數計二百十六數地用八方每一方有三陰每一陰有六數共計一十八數八箇十八數共計一百四十四數方見八用也爲人之父母陰陽各一氣天得一氣地得一氣共計三陰三陽即二十七三陰即下八方成四十五數八用在四十五數各有一氣將此氣若運用如天地之運方得天長地久也自然精神全頌曰天地陰陽六氣同八方造化亦無窮同於妙用如高下一粒丹砂九轉功五丹六月二十一日夫五者陽也田者陰也謂起初爲字已立丹田便是陰陽之數也丹字畫於五數爲按五行田字畫六數也爲按六氣故聖人云龍虎交在五六中宫是丹田相㑹上下昇降左會右合在中宫故號曰玄元可結玄珠鎮於丹田古經云龍虎交於五六聚寳在丹田要在生神與氣顛倒上崑崙頌曰五丹造化在陰陽氣欲生時神自祥龍虎運時交水火天眞成後最爲良萬神生成六月二十二日夫萬物皆因何物而成千靈皆因何物而就天地皆因否泰盡是變化只因氣運時候方應也人之生死皆因有時而應若在吉地爲吉其凶必遠若在凶地其吉必遠大用吉凶皆在人之所爲萬物在天地之所化吉凶在人之所作夫欲修身養命鍊氣存神若使功行方足果然神靈身自聖命自安獲無筭無窮之壽矣頌曰萬物生成要應成吉凶大小果隨心春來紅杏顔如火秋後園林橘似金男女卦數六月二十三日夫男子數用八女子數用七男子八八六十四卦數女子七七四十九數之筭男子卦盡即天眞少女子筭數盡即天癸絶眞精眞血若無生男女衆有者必有過於天壽爲得老陰老陽之氣也爲說修行之人如至年高如何修得精血盈骨髓滿魂魄安神氣全但能依此法修行金精不散心不亂志自正嘗聞信行不若常用周天八卦得氣生神一月功滿必可延生頌曰天癸天眞二氣同陽男陰女數其中精竭血散修行晩一訣方教老變童三篇六月二十四日夫三篇者一靈烏二靈臺三靈童夫靈烏者是人之心神也又號曰南方赤帝君能動能靜能善能惡一名赤鳳一名朱雀常生靈臺之宫號曰明堂常於明堂生靈臺之神號曰靈童此乃人之本性也若明此神性方識修行之祖宗也若不識此神性爲之暗昧也豈能知四通八遠四通者四正也八遠者是八方修行之子若用此四通八遠四正八卦周天火候鍊氣生神之法即無有不成三仙也如人修眞作用須當先識取三宮之神靈烏心也靈臺童也靈童性也古經云若使靈臺神性明自然生就無價珍寳也頌曰三宮第一要修心意識驅馳在淺深大藥鍊成龍虎伏金丹烹就鬼神飮龍虎交媾六月二十五日夫龍虎交在五六所出在舌龍虎上經之内爲之眞篇曰通神玉鎖内亦論也吾聞世中有道經千卷盡隱聖方妙法妙術玄機且夫眞一之術便是太陽之道吾今爲汝細說用心記之夫龍者震也屬木内隱火夫虎者兊也屬金内隱水交者屬土内和四象此是五行並足也方成造化若修身養命須用眞一之氣鍊三田之寳合象之神使八卦之爻用周天之火結腹内之胎方離塵世之景神仙之地可超凡入聖以爲成道頌曰五數爲陽六數陰龍交虎媾兩相吞木生水火皆逢土父母夫妻與子孫三才六月二十六日夫修眞者三才之眞皆有所成天之三眞者日月星地之三眞者水火風人之三眞者血氣精若三才者皆順天元地元人元相應時便是三才旺於本宫又說人之修養但令用三元相應上下相和氣血精長生旺方可龍左騰於火内虎跳於水中朱雀飛於離宫玄武定於坎位因此黄芽滋長白雪方榮氣灌八門時正四序使嬰童配與姹女黄婆㑹合金公靈通九轉之功聖出三田之内既然丹就方成眞人寳之奇功方能神出是吾修眞之訣頌曰三眞長生在三元白雪黃芽氣漸生方遇黃婆流源海千尋火烈起丹田二珠六月二十七日夫二珠者是眞水火也天有二珠日陽月陰地有二珠陽山陰水人有二珠精神血氣蓋爲天陽之氣左旋爲日地陰之氣右轉爲月是天眞之坎離也地亦陰陽相轉故山林相生人在世間受陰陽二氣父精母血交感氣足方可神全爲人却至數終二氣散失魂魄無歸哀哉如此空虚豈不痛哉吾聞如何得不死實而不虚聚而不散長生久視之理但修心精定用氣養神此爲眞道也頌曰二珠日月用周天靈氣冲和上下關八節四時都一用黃金白屋滿山川七成九敗六月二十八日夫出世之事有七般成有九般不成有七般成者一者宿有縁分二者得遇眞師三者便行實心四者作眞法五者積其大行六者信忠不退七者不逢諸魔如此七事謂之全修更有九者不成一者不信不忠二者有業魔障三者勞己苦形四者意狂心亂五者不遇至人六者不逢眞埋七者得法不行八者不持陰德九者不辯邪正此是下鬼之見也頌曰七成九敗在君修一氣三元最好收早向自家身内覓莫教迷了等閑休勸戒六月二十九日夫人若修昇天之路且須去惡行修上縁遠愚昧近賢良除是非絶貪愛敬六親滅財色誡貪嗔逢寃即解遇讎莫憎見貧施惠廣起慈悲常思身命莫忘修行如此之人謂之大行方有神仙保䕶衆聖提携依法行功久久丹就自是一眞有主可三道皆成從凡入聖有同火裏存蓮以假成眞恰如湯中見雪若使片時不絶必失人天之教恣縱迷情吾侣奉太上行化塵世度人奈何愚昧之夫不依上聖垂教故留此文名號修生之訣也頌曰平地生天出世塵無縁豈可見玄門莫言大道難遭遇到底須當要至人讃曰六月三十日修生祕訣養命眞詮下連九地上應高天陰陽一氣人可修焉滋潤百脉灌溉三田精血既滿神氣方全九還運轉七返留傳六爻八卦四象三元日月無失果應時年莫傳愚昧須度英賢若依此法必可昇仙古來志士用此成眞汝今修養切要堅心但持陰德休作餘愆一朝功畢入聖超凡更改塵骨居住蓬山此經非在人間自古至今上眞不傳於塵世不因吾侣行化爭得此文傳於天下如書一卷九祖生天之福如誦一徧罪滅恒沙若收其經在俗無患難入山滅虎狼萬邪不能近陰鬼不能傷若傳志人增加福壽若傳非徒永爲下鬼陰中受苦不得人身傳寫之時莫忘此戒也太上長文大洞靈寳幽玄上品妙經發揮
